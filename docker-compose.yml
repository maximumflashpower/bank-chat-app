version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lumo-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: lumo_admin
      POSTGRES_PASSWORD: LumoSecurePass2026
      POSTGRES_DB: bankchat_core
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lumo-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
